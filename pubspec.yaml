    - assets/pendant/item1.png
    - assets/pendant/item2.png
    - assets/pendant/item3.png
    - assets/pendant/item4.png
    - assets/bg/
  fonts:
  - family: MyRounded
    fonts:
      - asset: assets/fonts/AlibabaPuHuiTi-3-95-ExtraBold.ttf
